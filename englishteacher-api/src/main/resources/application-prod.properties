# ===============================
# SPRING PROFILE: PRODUCTION
# ===============================

spring.application.name=englishteacher-api

# ===============================
# DATABASE CONFIGURATION
# ===============================

spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USER}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection pool configuration for Azure
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000

# ===============================
# JPA CONFIGURATION
# ===============================

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# ===============================
# SERVER CONFIGURATION
# ===============================

server.port=${PORT:8080}

# ===============================
# CORS CONFIGURATION
# ===============================

spring.web.cors.allowed-origins=${CORS_ORIGINS:*}
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.web.cors.allowed-headers=*
spring.web.cors.allow-credentials=true

# ===============================
# JWT CONFIGURATION
# ===============================

jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:1800}

# ===============================
# LOGGING (PRODUCTION SAFE)
# ===============================

logging.level.org.hibernate.SQL=WARN
logging.level.com.englishproject=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# ===============================
# FILE UPLOAD CONFIGURATION
# ===============================

spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
app.upload.dir=${UPLOAD_DIR:/home/site/wwwroot/uploads}

# ===============================
# SECURITY CONFIGURATION
# ===============================

spring.security.enabled=false
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=WARN
