# ===============================
# SPRING PROFILE: PRODUCTION - AZURE (SQLite temporal)
# ===============================

spring.application.name=englishteacher-api

# ===============================
# DATABASE CONFIGURATION - SQLite (temporal hasta tener PostgreSQL en Azure)
# ===============================

spring.datasource.url=jdbc:sqlite:/home/site/wwwroot/data/englishteacher.db
spring.datasource.driver-class-name=org.sqlite.JDBC

# SQLite no requiere usuario/password
spring.datasource.hikari.maximum-pool-size=1
spring.datasource.hikari.connection-timeout=30000

# ===============================
# JPA CONFIGURATION
# ===============================

spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# ===============================
# SERVER CONFIGURATION
# ===============================

server.port=${PORT:8080}

# ===============================
# CORS CONFIGURATION
# ===============================

spring.web.cors.allowed-origins=${CORS_ORIGINS:*}
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.web.cors.allowed-headers=*
spring.web.cors.allow-credentials=true

# ===============================
# JWT CONFIGURATION
# ===============================

jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:3600}

# ===============================
# LOGGING
# ===============================

logging.level.org.hibernate.SQL=WARN
logging.level.com.englishproject=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# ===============================
# FILE UPLOAD CONFIGURATION
# ===============================

spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
app.upload.dir=${UPLOAD_DIR:/home/site/wwwroot/uploads}

# ===============================
# SECURITY CONFIGURATION
# ===============================

spring.security.enabled=false
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=WARN

